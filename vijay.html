<h1>Vijay</h1>  
</center>
<hr>
<p>
    C. Joseph Vijay (born 22 June 1974), popularly known as Vijay, is an Indian actor and politician who primarily works in Tamil cinema. A megastar in South India, he transitioned from a successful child actor and romantic lead into one of the highest-paid action stars in Indian cinema.
</p>
